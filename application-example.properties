# ============================================
# ARCHIVO DE EJEMPLO - Copiar a application.properties
# ============================================
# 1. Copia este archivo a src/main/resources/application.properties
# 2. Rellena tus datos reales (contraseñas, secretos, etc.)
# 3. NUNCA subas application.properties real a GitHub
# ============================================

spring.application.name=booking.api

# ============================================
# CONEXIÓN A BASE DE DATOS MySQL
# ============================================
# allowPublicKeyRetrieval=true SOLO para desarrollo local
# NO usar en producción
#
# Cambia "tu_base_datos", "tu_usuario" y "TU_CONTRASEÑA"
spring.datasource.url=jdbc:mysql://localhost:3306/tu_base_datos?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=tu_usuario
spring.datasource.password=TU_CONTRASEÑA_AQUI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# CONFIGURACIÓN JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# FLYWAY MIGRATIONS
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ============================================
# JWT (Autenticación)
# ============================================
# Genera tu propio secret: openssl rand -hex 32
jwt.secret=GENERA_TU_CLAVE_SECRETA_AQUI_CON_32_BYTES_HEX
jwt.expiration=86400000

# ============================================
# SERVIDOR
# ============================================
server.port=8080
server.error.include-message=always

# ============================================
# LOGGING (Cambia com.tuproyecto por tu package)
# ============================================
logging.level.com.reservation=DEBUG
logging.level.org.springframework.security=DEBUG